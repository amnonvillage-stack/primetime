<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>PrimeTime — Wizard</title>
  <style>
    /* ── Tokens ─────────────────────────────────────────────────────────────── */
    :root {
      --cream:      #FDF7F0;
      --paper:      #F9F2E8;
      --card:       #FFFFFF;
      --ink:        #2C3E50;
      --ink-mid:    #5D6D7E;
      --ink-light:  #A0ADB8;
      --red:        #C0392B;
      --red-dark:   #922B21;
      --red-light:  #FADBD8;
      --red-glow:   rgba(192,57,43,0.13);
      --line:       #E5DDD4;
      --radius:     14px;
      --shadow:     0 4px 24px rgba(44,62,80,0.09);
      --shadow-sm:  0 2px 10px rgba(44,62,80,0.07);
      --font-serif: Georgia, 'Times New Roman', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--cream);
      background-image:
        radial-gradient(circle at 15% 20%, rgba(192,57,43,0.04) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(44,62,80,0.03) 0%, transparent 50%);
      min-height: 100vh;
      color: var(--ink);
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    .app-header {
      direction: ltr;
      background: var(--red);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(192,57,43,0.35);
    }
    .header-logo {
      font-family: var(--font-serif);
      color: #fff; font-size: 1.25rem; font-weight: 700;
      letter-spacing: -0.2px;
    }
    .header-logo span { opacity: 0.75; font-weight: 400; font-size: 0.85rem; margin-left: 6px; }
    .header-key-btn {
      background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 8px; padding: 6px 10px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      color: #fff; font-size: 0.75rem; font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .header-key-btn:hover { background: rgba(255,255,255,0.25); }
    .header-key-btn .key-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff6b6b; flex-shrink: 0; transition: background 0.2s;
    }
    .header-key-btn .key-dot.set { background: #51cf66; }
    .key-bar {
      background: #1a252f; padding: 10px 20px;
      display: none; align-items: center; gap: 10px;
    }
    .key-bar.open { display: flex; }
    .key-bar label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: rgba(255,255,255,0.5); white-space: nowrap;
    }
    .key-bar input {
      flex: 1; padding: 7px 12px; border-radius: 7px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); color: #fff;
      font-size: 0.82rem; font-family: 'Courier New', monospace;
      outline: none; min-width: 0;
    }
    .key-bar input:focus { border-color: rgba(255,255,255,0.4); }
    .key-bar input::placeholder { color: rgba(255,255,255,0.25); }
    .key-bar-save {
      background: var(--red); color: #fff; border: none;
      border-radius: 7px; padding: 7px 14px; font-size: 0.8rem;
      font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .key-bar-save:hover { background: var(--red-dark); }

    /* ── Progress Track ──────────────────────────────────────────────────────── */
    .progress-wrap {
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px 16px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 8px rgba(44,62,80,0.05);
    }
    .progress-track {
      max-width: 480px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      position: relative;
    }
    .progress-track::before {
      content: '';
      position: absolute; top: 16px; left: 16px; right: 16px;
      height: 2px; background: var(--line); z-index: 0;
    }
    .progress-seg {
      position: absolute; top: 15px;
      height: 2px; background: var(--red); z-index: 1;
      transition: left 0.45s cubic-bezier(0.4,0,0.2,1),
                  width 0.45s cubic-bezier(0.4,0,0.2,1);
      border-radius: 1px;
    }
    .step-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700;
      border: 2px solid var(--line);
      background: var(--paper); color: var(--ink-light);
      position: relative; z-index: 2;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .step-dot.active {
      border-color: var(--red); background: var(--red);
      color: #fff; box-shadow: 0 0 0 4px var(--red-glow);
    }
    .step-dot.done {
      border-color: var(--red); background: var(--red); color: #fff;
    }
    .step-dot.done::after { content: '✓'; font-size: 0.75rem; }
    .step-dot.done .dot-num { display: none; }
    .step-label-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      max-width: 480px; margin: 8px auto 0;
      padding: 0 4px;
    }
    .step-label {
      font-size: 0.62rem; font-weight: 600; color: var(--ink-light);
      text-transform: uppercase; letter-spacing: 0.5px;
      text-align: center; width: 32px; flex-shrink: 0;
      transition: color 0.2s;
    }
    .step-label.active { color: var(--red); }
    .step-label.done   { color: var(--red); }

    /* ── Layout ──────────────────────────────────────────────────────────────── */
    .wizard-outer {
      max-width: 560px; margin: 0 auto;
      padding: 32px 16px 100px;
      overflow: hidden;
    }

    /* ── Step Panels ─────────────────────────────────────────────────────────── */
    .step-panel {
      display: none;
      animation: fadeSlideIn 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    .step-panel.active { display: block; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeSlideBack {
      from { opacity: 0; transform: translateX(-28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .step-panel.slide-back { animation: fadeSlideBack 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

    .step-heading {
      text-align: center; margin-bottom: 28px;
    }
    .step-heading h2 {
      font-family: var(--font-serif);
      font-size: 1.65rem; font-weight: 700;
      color: var(--ink); margin-bottom: 6px;
    }
    .step-heading p {
      font-size: 0.88rem; color: var(--ink-mid); line-height: 1.5;
    }

    /* ── Protein Dropdown ────────────────────────────────────────────────────── */
    .protein-dropdown {
      position: relative; margin-bottom: 22px;
    }
    .pd-trigger {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 11px 14px;
      background: var(--card); border: 2px solid var(--line);
      border-radius: var(--radius); cursor: pointer;
      text-align: left; box-shadow: var(--shadow-sm);
      transition: border-color 0.2s, box-shadow 0.15s;
    }
    .pd-trigger:focus { outline: none; }
    .pd-trigger:hover { border-color: var(--ink-mid); }
    .protein-dropdown.open .pd-trigger {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow), var(--shadow-sm);
    }
    .pd-icon {
      width: 32px; height: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .pd-icon svg { display: block; }
    .pd-label-text {
      flex: 1;
      font-family: var(--font-serif); font-size: 0.95rem; font-weight: 700;
      color: var(--ink);
    }
    .pd-label-text.placeholder { color: var(--ink-light); font-style: italic; font-weight: 400; }
    .pd-chevron {
      flex-shrink: 0; transition: transform 0.22s;
      color: var(--ink-light);
    }
    .protein-dropdown.open .pd-chevron { transform: rotate(180deg); }

    .pd-menu {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      z-index: 80; background: var(--card);
      border: 2px solid var(--line); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(44,62,80,0.14);
      overflow: hidden; direction: ltr;
    }
    .pd-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
      font-family: var(--font-serif); font-size: 0.9rem; font-weight: 700;
      color: var(--ink); transition: background 0.12s;
    }
    .pd-item:hover { background: var(--paper); }
    .pd-item.active { color: var(--red); background: var(--red-light); }
    .pd-item-icon { display: none; }

    /* ── Cut Dropdown ───────────────────────────────────────────────────────── */
    .cut-dropdown {
      position: relative; margin-top: 6px;
    }
    .cd-trigger {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 11px 14px;
      background: var(--card); border: 2px solid var(--line);
      border-radius: var(--radius); cursor: pointer;
      text-align: left; box-shadow: var(--shadow-sm);
      transition: border-color 0.2s, box-shadow 0.15s;
    }
    .cd-trigger:focus { outline: none; }
    .cd-trigger:hover { border-color: var(--ink-mid); }
    .cut-dropdown.open .cd-trigger {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow), var(--shadow-sm);
    }
    .cd-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .cd-icon svg { display: block; }
    .cd-label-wrap { flex: 1; min-width: 0; }
    .cd-label-text {
      font-family: var(--font-serif); font-size: 0.95rem; font-weight: 700;
      color: var(--ink); display: block; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .cd-label-text.placeholder { color: var(--ink-light); font-style: italic; font-weight: 400; }
    .cd-label-sub {
      font-size: 0.7rem; color: var(--ink-mid); display: block; margin-top: 1px;
    }
    .cd-chevron {
      flex-shrink: 0; transition: transform 0.22s; color: var(--ink-light);
    }
    .cut-dropdown.open .cd-chevron { transform: rotate(180deg); }
    .cd-menu {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      z-index: 80; background: var(--card);
      border: 2px solid var(--line); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(44,62,80,0.14);
      overflow: hidden; max-height: 320px; overflow-y: auto;
    }
    .cd-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
      transition: background 0.12s; border-bottom: 1px solid var(--line);
    }
    .cd-item:last-child { border-bottom: none; }
    .cd-item:hover { background: var(--paper); }
    .cd-item.active { background: var(--red-light); }
    .cd-item-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .cd-item-icon svg { display: block; }
    .cd-item-body { flex: 1; min-width: 0; }
    .cd-item-name {
      font-family: var(--font-serif); font-size: 0.9rem; font-weight: 700;
      color: var(--ink); display: block;
    }
    .cd-item.active .cd-item-name { color: var(--red); }
    .cd-item-meta {
      font-size: 0.68rem; color: var(--ink-mid);
      display: flex; gap: 6px; margin-top: 3px; flex-wrap: wrap;
    }
    .cd-badge {
      background: var(--paper); border: 1px solid var(--line);
      border-radius: 4px; padding: 1px 6px;
      font-size: 0.65rem; font-weight: 600; color: var(--ink-mid);
    }
    .cd-item.active .cd-badge { background: var(--red-light); border-color: var(--red); color: var(--red-dark); }

    /* ── Protein Grid (legacy, hidden) ──────────────────────────────────────── */
    .protein-grid { display: none; }
    .protein-tile {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 8px 12px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: var(--shadow-sm);
      position: relative; overflow: hidden;
    }
    .protein-tile::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(192,57,43,0.04), transparent 60%);
      opacity: 0; transition: opacity 0.2s;
    }
    .protein-tile:hover { border-color: var(--ink-mid); transform: translateY(-2px); box-shadow: var(--shadow); }
    .protein-tile:hover::before { opacity: 1; }
    .protein-tile:focus { outline: none; }
    .protein-tile.selected {
      border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow), var(--shadow);
      transform: translateY(-2px);
    }
    .protein-tile.selected::before { opacity: 1; }
    .protein-tile svg { display: block; }
    .protein-tile .tile-label {
      font-family: var(--font-serif);
      font-size: 0.68rem; font-style: italic;
      color: var(--ink-mid); text-align: center; line-height: 1.2;
    }
    .protein-tile.selected .tile-label { color: var(--red); font-weight: 700; }

    /* ── Cut Grid ────────────────────────────────────────────────────────────── */
    .cut-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 28px;
    }
    .cut-tile {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: 12px 6px 10px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      text-align: center;
    }
    .cut-tile:focus { outline: none; }
    .cut-tile:hover { border-color: var(--ink-mid); transform: translateY(-1px); box-shadow: var(--shadow); }
    .cut-tile.selected { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow), var(--shadow); }
    .cut-tile-icon {
      width: 54px; height: 54px; border-radius: 10px;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cut-tile-icon svg { display: block; }
    .cut-tile.selected .cut-tile-icon { background: var(--red-light); }
    .cut-tile-name {
      font-family: var(--font-serif);
      font-size: 0.72rem; font-weight: 700;
      color: var(--ink); line-height: 1.2;
    }
    .cut-tile.selected .cut-tile-name { color: var(--red); }
    .cut-tile-method {
      display: flex; flex-wrap: wrap; gap: 3px; justify-content: center;
    }
    .cut-badge {
      display: inline-block;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 0.58rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.4px;
      color: var(--ink-mid);
    }
    .cut-tile.selected .cut-badge { background: var(--red-light); border-color: var(--red); color: var(--red-dark); }

    /* ── Scale Step ──────────────────────────────────────────────────────────── */
    .scale-layout {
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }
    .scale-illus-wrap { position: relative; width: 280px; }
    .scale-label {
      position: absolute;
      top: 66px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--line);
      border-radius: 6px; padding: 4px 10px;
      font-family: var(--font-serif);
      font-size: 0.78rem; font-style: italic; color: var(--ink-mid);
      white-space: nowrap; max-width: 130px; overflow: hidden; text-overflow: ellipsis;
      text-align: center; pointer-events: none;
    }
    .scale-display-val {
      font-family: 'Courier New', monospace;
      font-size: 1rem; font-weight: 700; color: var(--red);
    }

    .weight-control {
      width: 100%; background: var(--card);
      border: 2px solid var(--line); border-radius: var(--radius);
      padding: 20px; box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: 14px;
    }
    .weight-control label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--ink-mid);
    }
    .weight-input-row { display: flex; gap: 10px; align-items: center; }
    .weight-input-row input {
      flex: 1; padding: 12px 16px;
      border: 2px solid var(--line); border-radius: 9px;
      font-size: 1.4rem; font-weight: 700; color: var(--ink);
      background: var(--paper); text-align: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: none; -webkit-appearance: none;
    }
    .weight-input-row input:focus {
      outline: none; border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow);
    }
    .unit-toggle {
      display: flex; border: 2px solid var(--line);
      border-radius: 9px; overflow: hidden; height: 52px;
    }
    .unit-toggle button {
      padding: 0 16px; border: none;
      background: var(--paper); color: var(--ink-mid);
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: all 0.15s;
    }
    .unit-toggle button.active { background: var(--ink); color: #fff; }
    .unit-toggle button:not(:last-child) { border-right: 2px solid var(--line); }

    /* Doneness in step 3 */
    .doneness-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--ink-mid); margin-bottom: 8px;
    }
    .doneness-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .d-btn {
      flex: 1; min-width: 66px; padding: 8px 4px;
      border: 2px solid var(--line); border-radius: 8px;
      background: var(--paper); color: var(--ink-mid);
      font-size: 0.7rem; font-weight: 600; cursor: pointer;
      text-align: center; line-height: 1.3; transition: all 0.15s;
    }
    .d-btn .temp { display: block; font-size: 0.6rem; font-weight: 400; opacity: 0.65; margin-top: 2px; }
    .d-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
    .d-btn.active { border-color: var(--red); background: var(--red); color: #fff; box-shadow: 0 2px 8px var(--red-glow); }
    .d-btn.active .temp { opacity: 0.85; }
    .d-btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .d-btn.fall-btn { border-color: #EFEBE9; color: #6D4C41; }
    .d-btn.fall-btn:hover:not(:disabled) { border-color: #8D6E63; background: #EFEBE9; }
    .d-btn.fall-btn.active { background: #6D4C41; border-color: #6D4C41; color: #fff; }
    .d-btn.smoke-btn { border-color: #ECEFF1; color: #37474F; }
    .d-btn.smoke-btn:hover:not(:disabled) { border-color: #78909C; background: #ECEFF1; }
    .d-btn.smoke-btn.active { background: #37474F; border-color: #37474F; color: #fff; }

    .doneness-hint-box {
      background: #FEF9E7; border: 1px solid #F9C74F;
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.8rem; color: #7D5A00; line-height: 1.45;
      display: none;
    }
    .doneness-hint-box.visible { display: block; }
    .doneness-hint-box strong { color: #5D3A00; }

    /* ── Oven Step ───────────────────────────────────────────────────────────── */
    .oven-layout { display: flex; flex-direction: column; align-items: center; gap: 28px; }
    .oven-illus-wrap { position: relative; width: 320px; }

    /* Oven display overlays */
    .oven-time-display {
      position: absolute;
      top: 45px; left: 50%; transform: translateX(-50%);
      background: #1A2030;
      border-radius: 5px;
      padding: 5px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      min-width: 100px; text-align: center;
    }
    .oven-display-label {
      font-size: 0.5rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(255,255,255,0.35);
    }
    .oven-display-num {
      font-family: 'Courier New', monospace;
      font-size: 1.1rem; font-weight: 700; color: #4FC3F7;
      letter-spacing: 2px; line-height: 1;
    }
    .oven-temp-display {
      position: absolute;
      top: 45px; right: 44px;
      background: #1A2030; border-radius: 5px;
      padding: 5px 10px; text-align: center; min-width: 52px;
    }
    .oven-temp-num {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem; font-weight: 700; color: #FF8A65;
      letter-spacing: 1px; line-height: 1;
    }

    /* ── Single-page layout ─────────────────────────────────────────────────── */
    .page-content {
      max-width: 480px; margin: 0 auto;
      padding: 16px 16px 60px;
      display: flex; flex-direction: column; gap: 0;
    }
    .pg-section { width: 100%; }
    .pg-hidden  { display: none; }
    .pg-reveal  { display: block; animation: fadeSlideIn 0.35s ease; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pg-divider {
      width: 100%; height: 1px;
      background: var(--line); margin: 24px 0 20px;
    }
    .section-label {
      font-family: var(--font-serif); font-size: 1.15rem;
      font-weight: 700; color: var(--ink); margin-bottom: 4px;
    }
    .section-sub {
      font-size: 0.82rem; color: var(--ink-mid);
      margin: 0 0 14px;
    }
    .btn-calculate {
      width: 100%; padding: 16px 24px;
      background: var(--red); color: #fff;
      border: none; border-radius: var(--radius);
      font-family: var(--font-serif); font-size: 1.05rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 14px var(--red-glow);
      margin-top: 4px;
    }
    .btn-calculate:hover:not(:disabled) {
      background: var(--red-dark); transform: translateY(-1px);
      box-shadow: 0 6px 18px var(--red-glow);
    }
    .btn-calculate:disabled {
      background: #D5D5D5; color: #A0A0A0;
      box-shadow: none; cursor: not-allowed; transform: none;
    }
    .btn-restart-inline {
      flex: 1; padding: 12px 20px;
      background: var(--paper); color: var(--ink);
      border: 2px solid var(--line); border-radius: var(--radius);
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-restart-inline:hover {
      border-color: var(--ink); background: var(--ink); color: #fff;
    }

    /* ── Dish Photo ─────────────────────────────────────────────────────────── */
    .dish-photo-wrap {
      width: 100%; margin: 14px 0 18px;
      border-radius: var(--radius); overflow: hidden;
      background: var(--paper);
      aspect-ratio: 16 / 9;
      position: relative;
    }
    .dish-photo {
      width: 100%; height: 100%; object-fit: cover;
      display: block; border-radius: var(--radius);
      opacity: 0; transition: opacity 0.5s ease;
    }
    .dish-photo.loaded { opacity: 1; }
    .dish-photo-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--paper) 25%, var(--line) 50%, var(--paper) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    .dish-photo-shimmer.hidden { display: none; }
    .dish-save-btn {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.55); color: #fff;
      border: none; border-radius: 8px;
      padding: 6px 12px; font-size: 0.75rem; font-weight: 700;
      cursor: pointer; display: none; align-items: center; gap: 5px;
      backdrop-filter: blur(4px); transition: background 0.15s;
    }
    .dish-save-btn.visible { display: flex; }
    .dish-save-btn:hover { background: rgba(0,0,0,0.75); }
    .dish-cache-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.45); color: #fff;
      border-radius: 6px; padding: 3px 8px;
      font-size: 0.65rem; font-weight: 700;
      display: none; backdrop-filter: blur(4px);
    }
    .dish-cache-badge.visible { display: block; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Results panel */
    .results-panel {
      width: 100%; background: var(--card);
      border: 2px solid var(--line); border-radius: var(--radius);
      padding: 20px; box-shadow: var(--shadow);
    }
    .results-cards {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .res-card {
      background: var(--paper); border-radius: 10px;
      padding: 14px 10px; text-align: center;
      border-top: 3px solid var(--line);
    }
    .res-card.primary { border-top-color: var(--red); }
    .res-card.secondary { border-top-color: var(--ink); }
    .res-card .rc-label {
      font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--ink-light); margin-bottom: 6px;
    }
    .res-card .rc-value {
      font-size: 2rem; font-weight: 800; line-height: 1;
      color: var(--ink); margin-bottom: 2px;
    }
    .res-card.primary .rc-value { color: var(--red); }
    .res-card .rc-unit { font-size: 0.7rem; color: var(--ink-mid); }

    /* Carry-over */
    .cow-box {
      background: #FEF9E7; border: 1px solid #F39C12;
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.78rem; color: #7D6608; line-height: 1.5;
      margin-bottom: 14px; display: none;
    }
    .cow-box.visible { display: block; }
    .cow-box strong { color: #5D4000; }

    /* Steps list */
    .results-steps-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--ink-light); margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid var(--line);
    }
    .results-steps-list { display: flex; flex-direction: column; gap: 10px; }
    .res-step {
      display: flex; gap: 12px; align-items: flex-start;
    }
    .res-step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--paper); border: 2px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; color: var(--ink-mid);
      flex-shrink: 0;
    }
    .res-step-num.done { background: var(--red); border-color: var(--red); color: #fff; }
    .res-step-text { font-size: 0.8rem; color: var(--ink-mid); line-height: 1.45; padding-top: 2px; }

    /* ── Bottom Nav ──────────────────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(253,247,240,0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--line);
      padding: 14px 24px;
      display: flex; gap: 12px; justify-content: center;
      z-index: 40;
    }
    .btn-back {
      padding: 13px 28px; border-radius: 10px;
      border: 2px solid var(--line); background: transparent;
      font-size: 0.9rem; font-weight: 600; color: var(--ink-mid);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-back:hover { border-color: var(--ink); color: var(--ink); }
    .btn-continue {
      flex: 1; max-width: 320px;
      padding: 14px 28px; border-radius: 10px;
      border: none; background: var(--red); color: #fff;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(192,57,43,0.35);
      letter-spacing: 0.1px;
    }
    .btn-continue:hover:not(:disabled) {
      background: var(--red-dark); transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.45);
    }
    .btn-continue:disabled {
      background: var(--line); color: var(--ink-light);
      cursor: not-allowed; box-shadow: none;
    }
    .btn-restart {
      padding: 13px 24px; border-radius: 10px;
      border: 2px solid var(--line); background: transparent;
      font-size: 0.88rem; font-weight: 600; color: var(--ink-mid);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-restart:hover { border-color: var(--ink); color: var(--ink); }
    .btn-copy {
      flex: 1; max-width: 280px;
      padding: 14px 28px; border-radius: 10px;
      border: none; background: var(--ink); color: #fff;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s; letter-spacing: 0.1px;
    }
    .btn-copy:hover { background: #1a252f; }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .protein-grid { grid-template-columns: repeat(5,1fr); gap: 6px; }
      .protein-tile { padding: 10px 4px 8px; }
      .cut-grid { grid-template-columns: repeat(2, 1fr); }
      .results-cards { grid-template-columns: 1fr; }
      .scale-illus-wrap { width: 240px; }
      .oven-illus-wrap { width: 280px; }
      .header-key-btn { padding: 4px 7px; font-size: 0.65rem; gap: 4px; }
      #header-key-label { display: none; }
      .lang-toggle { padding: 3px 7px; font-size: 0.85rem; }
    }
  </style>
</head>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="app-header">
  <div class="header-logo">PrimeTime <span id="header-tagline">Precision Meat Calculator</span></div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="lang-toggle" id="lang-toggle-btn" onclick="toggleLang()" title="Switch language">HE</button>
    <button class="header-key-btn" id="header-key-btn" onclick="toggleKeyBar()" title="Set Gemini API key">
      <span class="key-dot" id="key-dot"></span>
      <span id="header-key-label">Gemini Key</span>
    </button>
  </div>
</header>
<div class="key-bar" id="key-bar">
  <label>Gemini API Key</label>
  <input type="password" id="gemini-key-input" placeholder="AIza…"
         oninput="onKeyInput()" autocomplete="off" spellcheck="false"/>
  <button class="key-bar-save" onclick="saveKey()">Save</button>
  <span id="key-status" style="font-size:0.72rem;color:rgba(255,255,255,0.5);white-space:nowrap;min-width:0;overflow:hidden;text-overflow:ellipsis"></span>
</div>

<!-- ── Page Content ─────────────────────────────────────────────────────── -->
<div class="page-content">

  <!-- ── Cut selection ─────────────────────────────────────────────────── -->
  <div class="pg-section" id="sec-cut">
    <div class="section-label">Protein</div>

    <!-- Protein dropdown -->
    <div class="protein-dropdown" id="protein-dropdown">
      <button class="pd-trigger" id="pd-trigger" onclick="toggleProteinDropdown()" type="button">
        <div class="pd-icon" id="pd-icon">
          <svg width="30" height="30" style="display:block;opacity:0.35"><use href="#sv-p-beef"/></svg>
        </div>
        <span class="pd-label-text placeholder" id="pd-label">Select a protein…</span>
        <svg class="pd-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 5L7 9L11 5" stroke="#5D6D7E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="pd-menu" id="pd-menu" hidden></div>
    </div>

    <!-- Cut dropdown -->
    <div id="cut-grid-wrap" style="display:none">
      <div class="section-label" id="step2-title" style="margin-top:22px">Select your cut</div>
      <p class="section-sub" id="step2-sub"></p>
      <div class="cut-dropdown" id="cut-dropdown">
        <button class="cd-trigger" id="cd-trigger" onclick="toggleCutDropdown()" type="button">
          <div class="cd-icon" id="cd-icon">
            <svg width="36" height="36" style="display:block;opacity:0.25"><use href="#sv-ribeye"/></svg>
          </div>
          <div class="cd-label-wrap">
            <span class="cd-label-text placeholder" id="cd-label">Select a cut…</span>
            <span class="cd-label-sub" id="cd-label-sub"></span>
          </div>
          <svg class="cd-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5L7 9L11 5" stroke="#5D6D7E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="cd-menu" id="cd-menu" hidden></div>
      </div>
    </div>
  </div>

  <!-- ── Weight + Doneness ──────────────────────────────────────────────── -->
  <div class="pg-section pg-hidden" id="sec-weight">
    <div class="pg-divider"></div>
    <div class="section-label">Weight &amp; Doneness</div>
    <p class="section-sub">Weigh your <strong id="scale-protein-name">cut</strong> and choose doneness</p>
    <div class="weight-control">
      <div class="weight-input-row">
        <input type="number" id="weight-input" min="0.05" max="30" step="0.05"
               placeholder="0.0" oninput="onWeightInput()"/>
        <div class="unit-toggle">
          <button id="btn-kg" class="active" onclick="setUnit('kg')">kg</button>
          <button id="btn-lb" onclick="setUnit('lb')">lb</button>
        </div>
      </div>
      <div class="doneness-label" style="margin-top:14px">Doneness</div>
      <div class="doneness-row" id="doneness-row"></div>
      <div class="doneness-hint-box" id="doneness-hint-box"></div>
    </div>
  </div>

  <!-- ── Calculate button ───────────────────────────────────────────────── -->
  <div class="pg-section pg-hidden" id="sec-calc">
    <button class="btn-calculate" id="btn-calculate" onclick="calculate()" disabled>
      Calculate Cook Time →
    </button>
  </div>

  <!-- ── Results ────────────────────────────────────────────────────────── -->
  <div class="pg-section pg-hidden" id="sec-results">
    <div class="pg-divider"></div>
    <div class="section-label">Your cook</div>
    <p class="section-sub" id="result-summary-text"></p>

    <div class="dish-photo-wrap" id="dish-photo-wrap">
      <div class="dish-photo-shimmer" id="dish-shimmer"></div>
      <img class="dish-photo" id="dish-photo" alt="" />
      <button class="dish-save-btn" id="dish-save-btn" title="Save to pics folder">
        ⬇ Save photo
      </button>
    </div>

    <div class="results-cards">
      <div class="res-card primary">
        <div class="rc-label">Cook Time</div>
        <div class="rc-value" id="rc-cook">—</div>
        <div class="rc-unit" id="rc-cook-unit">min</div>
      </div>
      <div class="res-card secondary">
        <div class="rc-label">Oven Temp</div>
        <div class="rc-value" id="rc-temp">—</div>
        <div class="rc-unit" id="rc-temp-unit">°C</div>
      </div>
      <div class="res-card">
        <div class="rc-label">Rest Time</div>
        <div class="rc-value" id="rc-rest">—</div>
        <div class="rc-unit" id="rc-rest-unit">min</div>
      </div>
    </div>

    <div class="cow-box" id="cow-box"></div>

    <div class="results-steps-label">Step-by-step guide</div>
    <div class="results-steps-list" id="results-steps"></div>

    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
      <button class="btn-restart-inline" onclick="restartPage()">↺ Start Over</button>
      <button class="btn-restart-inline" onclick="copyResults()" style="border-color:var(--ink-mid)">⎘ Copy Results</button>
    </div>
  </div>

</div><!-- /page-content -->

  function sizeLabel(kg) {
    if (kg < 0.4)  return 'small individual portion';
    if (kg < 1.0)  return 'single generous serving';
    if (kg < 2.2)  return 'meal for two';
    if (kg < 4.0)  return 'large family roast';
    return 'impressive whole roast centerpiece';
  }

  function buildDishPrompt(proteinId, cut, donenessId, weightKg) {
    const doneness = DONENESS_VISUAL[donenessId] || donenessId;
    const size     = sizeLabel(weightKg);
    const weightStr= weightKg >= 1 ? `${weightKg.toFixed(1)}kg` : `${Math.round(weightKg*1000)}g`;
    const s        = (CUT_SCENE[proteinId]||{})[cut.id||''] ||
                     { scene: cut.label, garnish: 'fresh herbs, lemon', vessel: '' };

    // FLUX-realism responds best to concrete visual descriptions, not photography jargon
    const parts = [
      `food photo: ${s.scene}`,
      doneness,
      `${weightStr} ${size}`,
      s.garnish,
      s.vessel,
      'soft natural window light, shallow focus, clean background, appetizing',
    ].filter(Boolean);

    return parts.join('. ');
  }

  /* ── GEMINI KEY MANAGEMENT ──────────────────────────────────────────────── */
  let _geminiKey   = '';
  let _imageModels = [];

  function onKeyInput() {}
  function toggleKeyBar() {
    const bar = document.getElementById('key-bar');
    bar.classList.toggle('open');
    if (bar.classList.contains('open') && _geminiKey)
      document.getElementById('gemini-key-input').value = _geminiKey;
  }

  function saveKey() {
    const val    = document.getElementById('gemini-key-input').value.trim();
    const dot    = document.getElementById('key-dot');
    const status = document.getElementById('key-status');
    dot.classList.remove('set');
    if (!val) { document.getElementById('key-bar').classList.remove('open'); return; }

    _geminiKey   = val;
    _imageModels = [];
    status.textContent = 'Checking…'; status.style.color = 'rgba(255,255,255,0.5)';

    fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${val}`)
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error.message);
        const models = data.models || [];
        const gcImg  = models
          .filter(m => (m.supportedGenerationMethods||[]).includes('generateContent') && /image/i.test(m.name))
          .map(m => ({ id: m.name.replace('models/',''), type:'generateContent' }));
        const pred   = models
          .filter(m => (m.supportedGenerationMethods||[]).includes('predict') && /imagen/i.test(m.name))
          .map(m => ({ id: m.name.replace('models/',''), type:'predict' }));
        _imageModels = [...gcImg, ...pred];
        if (!_imageModels.length) {
          status.textContent = '⚠️ No image models on this key'; status.style.color = '#ff6b6b';
          dot.classList.remove('set');
        } else {
          dot.classList.add('set');
          status.textContent = `✓ ${_imageModels.map(m=>m.id).join(', ')}`;
          status.style.color = '#51cf66';
          setTimeout(() => document.getElementById('key-bar').classList.remove('open'), 1800);
        }
      })
      .catch(err => {
        status.textContent = `✗ ${err.message}`; status.style.color = '#ff6b6b';
        dot.classList.remove('set');
      });
  }

  /* ── PHOTO FILENAME BUILDER ─────────────────────────────────────────────── */
  function buildPhotoFilename(proteinId, cutId, donenessId, weightKg) {
    const protein  = MEAT_CONFIG[proteinId]?.label || proteinId;
    const cutLabel = MEAT_CONFIG[proteinId]?.cuts[cutId]?.label || cutId;
    const dObj     = DONENESS.find(d => d.id === donenessId);
    const doneness = (dObj?.label || donenessId).replace(/[^\w\s-]/g, '').trim();
    const weight   = weightKg >= 1 ? `${weightKg.toFixed(1)}kg` : `${Math.round(weightKg * 1000)}g`;
    return `${protein}_${cutLabel}_${weight}_${doneness}`;
  }

  /* ── TRY LOADING FROM pics/ CACHE ───────────────────────────────────────── */
  function tryLoadCached(filename) {
    return new Promise(resolve => {
      const exts = ['png', 'jpg', 'jpeg', 'webp'];
      let i = 0;
      function next() {
        if (i >= exts.length) { resolve(null); return; }
        const url = `pics/${filename}.${exts[i++]}`;
        const t   = new Image();
        t.onload  = () => resolve(url);
        t.onerror = next;
        t.src     = url;
      }
      next();
    });
  }

  /* ── DISH PHOTO LOADER ───────────────────────────────────────────────────── */
  function loadDishPhoto(proteinId, cutId, donenessId, weightKg) {
    const wrap      = document.getElementById('dish-photo-wrap');
    const img       = document.getElementById('dish-photo');
    const shimmer   = document.getElementById('dish-shimmer');
    const saveBtn   = document.getElementById('dish-save-btn');
    const cacheBadge= document.getElementById('dish-cache-badge');

    const filename = buildPhotoFilename(proteinId, cutId, donenessId, weightKg);
    const cut    = MEAT_CONFIG[proteinId]?.cuts[cutId] || { label: cutId, id: cutId };
    cut.id       = cutId;

    if (wrap) wrap.style.display = '';
    img.classList.remove('loaded');
    if (shimmer) shimmer.classList.remove('hidden');
    if (saveBtn)    { saveBtn.classList.remove('visible'); saveBtn.onclick = null; }
    if (cacheBadge)   cacheBadge.classList.remove('visible');

    function showImg(src, fromCache) {
      img.onload = () => {
        img.classList.add('loaded');
        if (shimmer) shimmer.classList.add('hidden');
        if (fromCache) {
          if (cacheBadge) cacheBadge.classList.add('visible');
        } else {
          if (saveBtn) {
            saveBtn.classList.add('visible');
            saveBtn.onclick = () => {
              const a = document.createElement('a');
              a.href     = src;
              a.download = filename + '.png';
              a.click();
            };
          }
        }
      };
      img.onerror = () => { if (wrap) wrap.style.display = 'none'; };
      img.src = src;
    }

    // ── Always check pics/ folder first ──────────────────────────────────────
    tryLoadCached(filename).then(cachedUrl => {
      if (cachedUrl) {
        showImg(cachedUrl, true);
        return;
      }
      // Not in cache — need Gemini key to generate
      if (!_geminiKey) {
        if (shimmer) shimmer.classList.add('hidden');
        if (wrap) wrap.style.display = 'none';
        return;
      }
      runGemini();
    });
    function runGemini() {
      const prompt = buildDishPrompt(proteinId, cut, donenessId, weightKg);

    // Use models discovered at save-time; fall back to known candidates
    const MODELS = _imageModels.length ? _imageModels : [
      { id: 'gemini-2.0-flash-exp',                  type: 'generateContent' },
      { id: 'gemini-2.0-flash-exp-image-generation', type: 'generateContent' },
      { id: 'imagen-3.0-generate-001',               type: 'predict'         },
      { id: 'imagen-3.0-fast-generate-001',          type: 'predict'         },
    ];
    let lastError = '';

    function tryModel(idx) {
      if (idx >= MODELS.length) {
        if (shimmer) shimmer.classList.add('hidden');
        if (wrap) {
          wrap.style.display = '';
          wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;min-height:120px;flex-direction:column;gap:8px;color:var(--ink-mid);font-size:0.8rem;padding:16px;text-align:center">
            <span style="font-size:1.5rem">⚠️</span>
            <strong>Image generation failed</strong>
            <span style="font-size:0.72rem;opacity:0.75;max-width:320px">${lastError}</span>
          </div>`;
        }
        return;
      }
      const { id: model, type } = MODELS[idx];
      if (type === 'generateContent') {
        fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${_geminiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { responseModalities: ['IMAGE', 'TEXT'] }
          })
        })
        .then(r => r.json())
        .then(data => {
          const imgPart = (data?.candidates?.[0]?.content?.parts || []).find(p => p.inlineData);
          if (imgPart) {
            showImg(`data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`);
          } else {
            lastError = data?.error?.message || `${model}: no image returned`;
            tryModel(idx + 1);
          }
        })
        .catch(err => { lastError = String(err); tryModel(idx + 1); });
      } else {
        fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:predict?key=${_geminiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1, aspectRatio: '16:9' } })
        })
        .then(r => r.json())
        .then(data => {
          const b64 = data?.predictions?.[0]?.bytesBase64Encoded;
          if (b64) {
            showImg(`data:${data.predictions[0].mimeType || 'image/png'};base64,${b64}`);
          } else {
            lastError = data?.error?.message || `${model}: no image returned`;
            tryModel(idx + 1);
          }
        })
        .catch(err => { lastError = String(err); tryModel(idx + 1); });
      }
    }
    tryModel(0);
    } // end runGemini
  }

  function t(key) { return STRINGS[currentLang][key]; }
  function tCutLabel(proteinId, cutId) {
    return STRINGS[currentLang].cut_labels[proteinId]?.[cutId] || MEAT_CONFIG[proteinId]?.cuts[cutId]?.label || cutId;
  }
  function tProteinLabel(proteinId) {
    return STRINGS[currentLang].protein_labels[proteinId] || proteinId;
  }
  function tDonenessLabel(id) {
    return STRINGS[currentLang].doneness_labels[id] || id;
  }
  function tMethod(method) {
    return STRINGS[currentLang].method_labels[method] || method;
  }

  function toKg(v,u){ return u==='lb'?v/KG_TO_LB:v; }
  function cToF(c){ return Math.round(c*9/5+32); }

  const METHOD_LABELS = {
    'pan-sear':'Pan + Oven','oven-roast':'Oven','oven-slow':'Slow Oven','oven-whole':'Whole Roast'
  };
  const METHOD_ICONS = {
    'pan-sear':'🔥','oven-roast':'♨️','oven-slow':'⏳','oven-whole':'🍽️'
  };

  function getRestTime(method, weightKg, donenessId) {
    if (donenessId==='smoked'){ if(method==='oven-whole')return 30; if(weightKg>2)return 90; if(weightKg>1)return 60; return 45; }
    if (method==='oven-whole') return 20;
    if (weightKg>3) return 25;
    if (weightKg>1) return 15;
    return 5;
  }

  /* ── STATE ───────────────────────────────────────────────────────────────── */
  let sel = { protein:null, cut:null, weight:null, doneness:null, unit:'kg' };

  /* ── SINGLE-PAGE REVEAL ──────────────────────────────────────────────────── */
  function reveal(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('pg-hidden');
    el.classList.add('pg-reveal');
  }

  function checkCalcReady() {
    const ready = !!(sel.weight && sel.doneness);
    const btn = document.getElementById('btn-calculate');
    if (btn) {
      btn.disabled = !ready;
    }
    // Show calc section once weight+doneness section is visible
    reveal('sec-calc');
  }

  /* ── PROTEIN DROPDOWN ───────────────────────────────────────────────────── */
  /* ── PROTEIN DROPDOWN ───────────────────────────────────────────────────── */
  const PROTEIN_META = {
    beef:    { label: 'Beef',    sym: 'sv-p-beef',    sz: 30 },
    lamb:    { label: 'Lamb',    sym: 'sv-p-lamb',    sz: 27 },
    pork:    { label: 'Pork',    sym: 'sv-p-pork',    sz: 30 },
    poultry: { label: 'Poultry', sym: 'sv-p-poultry', sz: 27 },
    fish:    { label: 'Fish',    sym: 'sv-p-fish',    sz: 30 },
  };

  function buildProteinDropdown() {
    const menu = document.getElementById('pd-menu');
    menu.innerHTML = '';
    Object.entries(PROTEIN_META).forEach(([id, meta]) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'pd-item' + (sel.protein === id ? ' active' : '');
      btn.innerHTML = `
        <div class="pd-item-icon">
          <svg width="${meta.sz}" height="${meta.sz}" style="display:block"><use href="#${meta.sym}"/></svg>
        </div>
        <span>${tProteinLabel(id)}</span>`;
      btn.onclick = () => selectProtein(id);
      menu.appendChild(btn);
    });
  }

  function toggleProteinDropdown() {
    const dd = document.getElementById('protein-dropdown');
    const menu = document.getElementById('pd-menu');
    const isOpen = !menu.hidden;
    if (!isOpen) {
      buildProteinDropdown();
      menu.hidden = false;
      dd.classList.add('open');
      // Close on outside click
      setTimeout(() => {
        document.addEventListener('click', closeProteinDropdown, { once: true, capture: true });
      }, 0);
    } else {
      closeProteinDropdownNow();
    }
  }

  function closeProteinDropdown(e) {
    const dd = document.getElementById('protein-dropdown');
    if (dd && dd.contains(e.target)) { return; }
    closeProteinDropdownNow();
  }
  function closeProteinDropdownNow() {
    const dd   = document.getElementById('protein-dropdown');
    const menu = document.getElementById('pd-menu');
    if (menu) menu.hidden = true;
    if (dd)   dd.classList.remove('open');
  }

  function selectProtein(id) {
    sel.protein = id; sel.cut = null; sel.doneness = null;
    closeProteinDropdownNow();

    // Update trigger label + icon
    const meta = PROTEIN_META[id];
    document.getElementById('pd-label').textContent = tProteinLabel(id);
    document.getElementById('pd-label').classList.remove('placeholder');
    document.getElementById('pd-icon').innerHTML =
      `<svg width="${meta.sz}" height="${meta.sz}" style="display:block"><use href="#${meta.sym}"/></svg>`;

    // Show cut dropdown
    const wrap = document.getElementById('cut-grid-wrap');
    if (wrap) wrap.style.display = '';
    // Reset cut trigger to placeholder
    const cdLabel = document.getElementById('cd-label');
    const cdSub   = document.getElementById('cd-label-sub');
    const cdIcon  = document.getElementById('cd-icon');
    if (cdLabel){ cdLabel.textContent=t('selectCut'); cdLabel.classList.add('placeholder'); }
    if (cdSub)  { cdSub.textContent=''; }
    if (cdIcon) { cdIcon.innerHTML='<svg width="36" height="36" style="display:block;opacity:0.25"><use href="#sv-ribeye"/></svg>'; }
    closeCutDropdownNow();
    buildCutDropdown();
  }

  /* ── Cut Dropdown ───────────────────────────────────────────────────────── */
  function buildCutDropdown() {
    const protein = MEAT_CONFIG[sel.protein];
    const svgMap  = CUT_SVG_ID[sel.protein] || {};
    document.getElementById('step2-title').textContent = t('chooseCut')(tProteinLabel(sel.protein));
    document.getElementById('step2-sub').textContent   = t('cutsAvail')(Object.keys(protein.cuts).length);
    const menu = document.getElementById('cd-menu');
    menu.innerHTML = '';
    Object.entries(protein.cuts).forEach(([id, cut]) => {
      const svgRef  = svgMap[id];
      const iconHTML = svgRef
        ? `<svg width="36" height="36" style="display:block"><use href="${svgRef}"/></svg>`
        : `<span style="font-size:1.5rem">${METHOD_ICONS[cut.method] || '🍳'}</span>`;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'cd-item' + (sel.cut === id ? ' active' : '');
      const ovenC = cut.ovenC;
      btn.innerHTML = `
        <div class="cd-item-icon">${iconHTML}</div>
        <div class="cd-item-body">
          <span class="cd-item-name">${tCutLabel(sel.protein, id)}</span>
          <div class="cd-item-meta">
            <span class="cd-badge">${tMethod(cut.method)}</span>
            <span class="cd-badge">${ovenC}°C</span>
          </div>
        </div>`;
      btn.onclick = () => selectCut(id);
      menu.appendChild(btn);
    });

  function toggleCutDropdown() {
    const dd   = document.getElementById('cut-dropdown');
    const menu = document.getElementById('cd-menu');
    const isOpen = !menu.hidden;
    if (!isOpen) {
      buildCutDropdown();
      menu.hidden = false;
      dd.classList.add('open');
      setTimeout(() => {
        document.addEventListener('click', closeCutDropdown, { once: true, capture: true });
      }, 0);
    } else {
      closeCutDropdownNow();
    }
  }

  function closeCutDropdown(e) {
    const dd = document.getElementById('cut-dropdown');
    if (dd && dd.contains(e.target)) { return; }
    closeCutDropdownNow();
  }

  function closeCutDropdownNow() {
    const dd   = document.getElementById('cut-dropdown');
    const menu = document.getElementById('cd-menu');
    if (menu) menu.hidden = true;
    if (dd)   dd.classList.remove('open');
  }

  function selectCut(id) {
    sel.cut = id; sel.doneness = null; sel.weight = null;
    closeCutDropdownNow();

    // Update trigger label + icon
    const svgMap = CUT_SVG_ID[sel.protein] || {};
    const cut    = MEAT_CONFIG[sel.protein].cuts[id];
    const svgRef = svgMap[id];
    document.getElementById('cd-label').textContent = tCutLabel(sel.protein, id);
    document.getElementById('cd-label').classList.remove('placeholder');
    document.getElementById('cd-label-sub').textContent =
      `${tMethod(cut.method)} · ${cut.ovenC}°C`;
    document.getElementById('cd-icon').innerHTML = svgRef
      ? `<svg width="36" height="36" style="display:block"><use href="${svgRef}"/></svg>`
      : `<span style="font-size:1.5rem">${METHOD_ICONS[cut.method] || '🍳'}</span>`;

    // Reveal weight/doneness section
    reveal('sec-weight');
    buildDonenessRow();
    // Reset calc+results
    const secCalc    = document.getElementById('sec-calc');
    const secResults = document.getElementById('sec-results');
    if (secCalc)    { secCalc.classList.add('pg-hidden'); secCalc.classList.remove('pg-reveal'); }
    if (secResults) { secResults.classList.add('pg-hidden'); secResults.classList.remove('pg-reveal'); }
    document.getElementById('weight-input').value = '';
    // Smooth scroll to weight section
    setTimeout(() => {
      const el = document.getElementById('sec-weight');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  }

  /* ── STEP 3: Scale / Weight ──────────────────────────────────────────────── */
  function buildDonenessRow() {
    const cut = MEAT_CONFIG[sel.protein].cuts[sel.cut];
    document.getElementById('scale-protein-name').textContent = tCutLabel(sel.protein, sel.cut);
    document.getElementById('weight-input').value = sel.weight||'';
    updateScaleDisplay();

    const row = document.getElementById('doneness-row');
    row.innerHTML = '';
    DONENESS.forEach(d => {
      const btn = document.createElement('button');
      let cls = 'd-btn';
      if(d.isSmoked) cls+=' smoke-btn';
      else if(d.isSlow) cls+=' fall-btn';
      if(sel.doneness===d.id) cls+=' active';
      btn.className=cls; btn.dataset.id=d.id;
      const locked = cut.donenessLock && !cut.donenessLock.includes(d.id);
      btn.disabled = locked;
      btn.innerHTML = `<span>${tDonenessLabel(d.id)}</span><span class="temp">${d.targetC}°C+</span>`;
      btn.onclick = ()=>selectDoneness(d.id);
      row.appendChild(btn);
    });
  }

  function onWeightInput() {
    sel.weight = parseFloat(document.getElementById('weight-input').value)||null;
    updateScaleDisplay();
    checkCalcReady();
  }

  function updateScaleDisplay() {
    // no scale illustration in single-page; no-op
  }

  function setUnit(unit) {
    const inp = document.getElementById('weight-input');
    const cur = parseFloat(inp.value);
    if(!isNaN(cur)&&cur>0){
      if(unit==='lb'&&sel.unit==='kg') inp.value=+(cur*KG_TO_LB).toFixed(2);
      else if(unit==='kg'&&sel.unit==='lb') inp.value=+(cur/KG_TO_LB).toFixed(2);
    }
    sel.unit=unit; sel.weight=parseFloat(inp.value)||null;
    document.getElementById('btn-kg').classList.toggle('active',unit==='kg');
    document.getElementById('btn-lb').classList.toggle('active',unit==='lb');
    updateScaleDisplay(); checkCalcReady();
  }

  function selectDoneness(id) {
    sel.doneness = id;
    document.querySelectorAll('.d-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
    // Show hint
    const cut = MEAT_CONFIG[sel.protein].cuts[sel.cut];
    const d   = DONENESS.find(x=>x.id===id);
    const tc  = (cut.targetCMap&&cut.targetCMap[id])||d.targetC;
    const hint = document.getElementById('doneness-hint-box');
    const descs = STRINGS[currentLang].doneness_hints;
    hint.innerHTML = t('targetTemp')(tc, cToF(tc)) + (descs[id]||'');
    hint.classList.add('visible');
    checkCalcReady();
    // Smooth scroll to calc button
    setTimeout(() => {
      const el = document.getElementById('sec-calc');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 80);
  }

  /* ── TIME FORMATTER ─────────────────────────────────────────────────────── */
  function fmtMin(m) {
    m = Math.round(m);
    if (currentLang === 'he') {
      if (m < 60) return m + " דק'";
      const h = Math.floor(m / 60), rem = m % 60;
      return rem ? h + " ש' " + rem + " דק'" : h + " ש'";
    }
    if (m < 60) return m + ' min';
    const h   = Math.floor(m / 60);
    const rem = m % 60;
    return rem ? h + 'h ' + rem + 'min' : h + 'h';
  }

  /* ── STEP 4: Results ─────────────────────────────────────────────────────── */
  function buildResults() {
    const proteinId = sel.protein;
    const cutId     = sel.cut;
    const weightKg  = toKg(sel.weight, sel.unit);
    const donenessId= sel.doneness;
    const protein   = MEAT_CONFIG[proteinId];
    const cut       = protein.cuts[cutId];
    const dObj      = DONENESS.find(d=>d.id===donenessId);

    const R = cut.R[donenessId];
    let cookMin = Math.round(weightKg * R + cut.C);
    if(cut.isFish&&donenessId==='smoked') cookMin=Math.max(cookMin,30);
    if(donenessId==='fall-off-bone') cookMin=Math.max(cookMin,90);

    const restMin = cut.restOverride!==undefined ? cut.restOverride : getRestTime(cut.method, weightKg, donenessId);
    const ovenC   = (cut.ovenCByDoneness&&cut.ovenCByDoneness[donenessId])||cut.ovenC;
    const targetC = (cut.targetCMap&&cut.targetCMap[donenessId])||dObj.targetC;

    // Summary
    const wLabel = `${sel.weight}${sel.unit}`;
    document.getElementById('result-summary-text').textContent =
      `${tProteinLabel(proteinId)} · ${tCutLabel(proteinId, cutId)} · ${wLabel} · ${tDonenessLabel(donenessId)}`;

    // Dish photo
    loadDishPhoto(proteinId, cutId, donenessId, weightKg);

    // Cards
    document.getElementById('rc-cook').textContent     = fmtMin(cookMin);
    document.getElementById('rc-cook-unit').textContent= '';
    document.getElementById('rc-temp').textContent     = ovenC||'🔥';
    document.getElementById('rc-temp-unit').textContent= ovenC ? `°C (${cToF(ovenC)}°F)` : t('hotPan');
    document.getElementById('rc-rest').textContent     = fmtMin(restMin);
    document.getElementById('rc-rest-unit').textContent= '';

    // Carry-over
    const cowBox = document.getElementById('cow-box');
    if(dObj.carryOver){
      const pullC = targetC-4;
      cowBox.innerHTML = t('carryOver')(pullC, cToF(pullC), targetC);
      cowBox.classList.add('visible');
    } else { cowBox.classList.remove('visible'); }

    // Steps
    const steps = buildSteps(cut, cookMin, ovenC, restMin, donenessId, targetC);
    const stepsEl = document.getElementById('results-steps');
    stepsEl.innerHTML = '';
    steps.forEach((s,i)=>{
      const isLast = i===steps.length-1;
      stepsEl.innerHTML+=`
        <div class="res-step">
          <div class="res-step-num ${isLast?'done':''}">${i+1}</div>
          <div class="res-step-text">${s}</div>
        </div>`;
    });
  }

  /* ── CALCULATE (single-page trigger) ───────────────────────────────────────*/
  function calculate() {
    buildResults();
    reveal('sec-results');
    setTimeout(() => {
      const el = document.getElementById('sec-results');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  }

  /* ── STEP GENERATOR (condensed) ──────────────────────────────────────────── */
  function buildSteps(cut, cookMin, ovenC, restMin, donenessId, targetC) {
    if (currentLang === 'he') return buildStepsHe(cut, cookMin, ovenC, restMin, donenessId, targetC);
    const steps=[]; const m=cut.method; const pullC=targetC-4;
    if(donenessId==='fall-off-bone'){
      if(cut.isRibs){
        steps.push('Remove silverskin from bone-side; apply dry rub, rest 30 min');
        steps.push(`Preheat oven to ${ovenC}°C`);
        steps.push(`Wrap tightly in 2 layers of foil. Slow-roast ${fmtMin(cookMin)}`);
        steps.push('Unwrap; glaze with BBQ sauce, return uncovered 15–20 min');
        steps.push(`Rest loosely tented ${fmtMin(restMin)}`);
      } else {
        steps.push('Bring meat to room temperature (30–60 min)');
        steps.push(`Preheat oven to ${ovenC}°C (low & slow)`);
        steps.push('Season generously; sear all sides (optional). Place in sealed Dutch oven or double-foil with aromatics');
        steps.push(`Slow-roast ${fmtMin(cookMin)}`);
        steps.push(`Check at ${fmtMin(Math.round(cookMin*0.85))} — should pull apart with two forks`);
        steps.push(`Rest covered ${fmtMin(restMin)}`);
      }
      return steps;
    }
    if(donenessId==='smoked'){
      steps.push('Soak 2–3 handfuls hardwood chips 30 min; wrap in double foil, poke 6–8 holes — smoke pouch');
      steps.push(`Place pouch on oven floor. Preheat to ${ovenC}°C, allow 20–30 min for smoke to start`);
      if(cut.isRibs){
        steps.push('Apply dry rub; smoke uncovered first half, then Texas Crutch (wrap in foil with apple juice)');
        steps.push('Unwrap, glaze with BBQ sauce for final 20 min');
      } else {
        const stall=Math.round(cookMin*0.55);
        steps.push(`Smoke uncovered ${fmtMin(stall)} — bark will form. Expect a temp stall at 65–70°C (normal)`);
        steps.push(`Wrap in foil; continue remaining ~${fmtMin(cookMin-stall)} until probe reads ${targetC}°C`);
      }
      steps.push(`Rest wrapped in towels in a cooler ${fmtMin(restMin)}`);
      return steps;
    }
    if(m==='pan-sear'){
      steps.push('Preheat dry pan to high heat (no oil)');
      steps.push(`Sear ${Math.round(cut.C/2)} min each side`);
      steps.push(`Finish in ${ovenC}°C oven ~${fmtMin(Math.max(1,cookMin-cut.C))}`);
      steps.push(`Pull at internal temp ${pullC}°C (carry-over will reach ${targetC}°C)`);
    } else if(m==='oven-slow'){
      steps.push(`Preheat oven to ${ovenC}°C`);
      steps.push('Season; seal in Dutch oven or tight foil');
      steps.push(`Slow-roast ${fmtMin(cookMin)}`);
      steps.push(`Target internal temp: ${targetC}°C`);
    } else if(m==='oven-whole'){
      steps.push(`Preheat oven to ${ovenC}°C`);
      steps.push('Pat dry; truss and season inside and out');
      steps.push(`Roast ${fmtMin(cookMin)}, baste halfway`);
      steps.push(`Probe thickest part of thigh — target ${targetC}°C`);
    } else {
      steps.push(`Preheat oven to ${ovenC}°C`);
      steps.push('Season and place on rack or lined tray');
      steps.push(`Roast ${fmtMin(cookMin)} (check at ${fmtMin(cookMin-10)})`);
      steps.push(cut.isFish ? `Fish is done when flesh flakes and reaches ${targetC}°C (${cToF(targetC)}°F)` : `Pull at ${pullC}°C — carry-over finishes to ${targetC}°C`);
    }
    steps.push(`Rest ${fmtMin(restMin)} before carving`);
    return steps;
  }


  /* ── STEP GENERATOR — Hebrew ─────────────────────────────────────────────── */
  function buildStepsHe(cut, cookMin, ovenC, restMin, donenessId, targetC) {
    const steps=[]; const m=cut.method; const pullC=targetC-4;
    if(donenessId==='fall-off-bone'){
      if(cut.isRibs){
        steps.push(`הסר את הסרום מצד העצם; מרח תיבול יבש, מנוחה 30 דק'`);
        steps.push(`חמם תנור ל-${ovenC}°C`);
        steps.push(`עטוף היטב ב-2 שכבות נייר כסף. אפה לאט ${fmtMin(cookMin)}`);
        steps.push(`פתח; מרח רוטב BBQ, חזור לתנור 15–20 דק' ללא כיסוי`);
        steps.push(`מנוחה רפויה ${fmtMin(restMin)}`);
      } else {
        steps.push('הוצא מהמקרר 30–60 דקות לפני הבישול');
        steps.push(`חמם תנור ל-${ovenC}°C (נמוך ואיטי)`);
        steps.push('תבל ביד נדיבה; אופציונלי — צרוב מכל הצדדים. הכנס לסיר צרפתי סגור או נייר כסף כפול עם תבלינים');
        steps.push(`אפה לאט ${fmtMin(cookMin)}`);
        steps.push(`בדוק בזמן ${fmtMin(Math.round(cookMin*0.85))} — צריך להתפרק בשתי מזלגות`);
        steps.push(`מנוחה מכוסה ${fmtMin(restMin)}`);
      }
      return steps;
    }
    if(donenessId==='smoked'){
      steps.push(`השרה 2–3 חופנים שבבי עץ 30 דק' עטוף בנייר כסף כפול, נקב 6–8 חורים — כרית עשן`);
      steps.push(`הנח כרית על רצפת התנור. חמם ל-${ovenC}°C, המתן 20–30 דק' לעשן להתחיל`);
      if(cut.isRibs){
        steps.push('מרח תיבול יבש; עשן ללא כיסוי חצי ראשון, ואז Texas Crutch (עטוף בנייר כסף עם מיץ תפוחים)');
        steps.push('פתח, מרח רוטב BBQ ב-20 הדקות האחרונות');
      } else {
        const stall=Math.round(cookMin*0.55);
        steps.push(`עשן ללא כיסוי ${fmtMin(stall)} — תיווצר קליפה. צפוי עצירת טמפ' ב-65–70°C (נורמלי)`);
        steps.push(`עטוף בנייר כסף; המשך ~${fmtMin(cookMin-stall)} עד שבדיקת חום מגיעה ${targetC}°C`);
      }
      steps.push(`מנוחה עטוף במגבות ${fmtMin(restMin)}`);
      return steps;
    }
    if(m==='pan-sear'){
      steps.push('חמם מחבת יבשה לחום גבוה (ללא שמן)');
      steps.push(`צרוב ${Math.round(cut.C/2)} דק' כל צד`);
      steps.push(`סיים בתנור ${ovenC}°C ~${fmtMin(Math.max(1,cookMin-cut.C))}`);
      steps.push(`הוצא בטמפ' ${pullC}°C (חום שיורי יגיע ל-${targetC}°C)`);
    } else if(m==='oven-slow'){
      steps.push(`חמם תנור ל-${ovenC}°C`);
      steps.push('תבל; סגור בסיר צרפתי או נייר כסף הדוק');
      steps.push(`אפה לאט ${fmtMin(cookMin)}`);
      steps.push(`טמפ' פנימית יעד: ${targetC}°C`);
    } else if(m==='oven-whole'){
      steps.push(`חמם תנור ל-${ovenC}°C`);
      steps.push('יבש היטב; קשור ותבל מבפנים ומבחוץ');
      steps.push(`אפה ${fmtMin(cookMin)}, שפוך נוזלים באמצע הבישול`);
      steps.push(`בדוק בחלק העבה של הירך — יעד ${targetC}°C`);
    } else {
      steps.push(`חמם תנור ל-${ovenC}°C`);
      steps.push('תבל והנח על רשת או תבנית מרופדת');
      steps.push(`אפה ${fmtMin(cookMin)} (בדוק בזמן ${fmtMin(cookMin-10)})`);
      steps.push(cut.isFish ? `הדג מוכן כשהבשר מתפרד ומגיע ל-${targetC}°C (${cToF(targetC)}°F)` : `הוצא ב-${pullC}°C — חום שיורי ישלים ל-${targetC}°C`);
    }
    steps.push(`מנוחה ${fmtMin(restMin)} לפני החיתוך`);
    return steps;
  }

  /* ── COPY + RESTART ──────────────────────────────────────────────────────── */
  function copyResults() {
    const cook = document.getElementById('rc-cook').textContent;
    const temp = document.getElementById('rc-temp').textContent;
    const rest = document.getElementById('rc-rest').textContent;
    const summ = document.getElementById('result-summary-text').textContent;
    const steps= [...document.querySelectorAll('.res-step-text')].map((el,i)=>`${i+1}. ${el.textContent}`).join('\n');
    const text = `PrimeTime Result\n${summ}\n\nCook Time: ${cook}\nOven Temp: ${temp}°C\nRest Time: ${rest}\n\nSteps:\n${steps}`;
    navigator.clipboard.writeText(text).then(()=>{
      // Find the copy button by its onclick attribute text
      const btns = [...document.querySelectorAll('.btn-restart-inline')];
      const btn  = btns.find(b => b.textContent.includes('Copy'));
      if(btn){ btn.textContent='✓ Copied!'; setTimeout(()=>btn.textContent='⎘ Copy Results',2000); }
    });
  }

  function restartPage() {
    sel = { protein:null, cut:null, weight:null, doneness:null, unit:'kg' };
    // Reset protein dropdown
    const pdLabel = document.getElementById('pd-label');
    const pdIcon  = document.getElementById('pd-icon');
    const wrap    = document.getElementById('cut-grid-wrap');
    const cdMenu  = document.getElementById('cd-menu');
    if (pdLabel){ pdLabel.textContent='Select a protein…'; pdLabel.classList.add('placeholder'); }
    if (pdIcon) { pdIcon.innerHTML='<svg width="30" height="30" style="display:block;opacity:0.35"><use href="#sv-p-beef"/></svg>'; }
    if (wrap)   { wrap.style.display='none'; }
    if (cdMenu) { cdMenu.innerHTML=''; }
    // Reset cut dropdown trigger
    const cdLabel = document.getElementById('cd-label');
    const cdSub   = document.getElementById('cd-label-sub');
    const cdIcon  = document.getElementById('cd-icon');
    if (cdLabel){ cdLabel.textContent='Select a cut…'; cdLabel.classList.add('placeholder'); }
    if (cdSub)  { cdSub.textContent=''; }
    if (cdIcon) { cdIcon.innerHTML='<svg width="36" height="36" style="display:block;opacity:0.25"><use href="#sv-ribeye"/></svg>'; }
    closeCutDropdownNow();
    closeProteinDropdownNow();
    // Hide lower sections
    ['sec-weight','sec-calc','sec-results'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.classList.add('pg-hidden'); el.classList.remove('pg-reveal'); }
    });
    // Reset unit buttons
    document.getElementById('btn-kg').classList.add('active');
    document.getElementById('btn-lb').classList.remove('active');
    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  // Legacy alias
  function restartWizard() { restartPage(); }

  /* ── INIT ────────────────────────────────────────────────────────────────── */
  // Single-page: nothing to init — sections reveal on interaction

  /* ── LANGUAGE TOGGLE ────────────────────────────────────────────────────── */
  function applyLang() {
    const L   = STRINGS[currentLang];
    const dir = currentLang === 'he' ? 'rtl' : 'ltr';
    document.documentElement.dir  = dir;
    document.documentElement.lang = currentLang;

    // Toggle button only (header strip stays English always)
    const langBtn = document.getElementById('lang-toggle-btn');
    if (langBtn) langBtn.textContent = currentLang === 'en' ? 'HE' : 'EN';

    // Section labels
    const secCutLbl = document.querySelector('#sec-cut .section-label');
    if (secCutLbl) secCutLbl.textContent = L.protein;

    // Protein placeholder (only when nothing selected)
    const pdLabel = document.getElementById('pd-label');
    if (pdLabel && pdLabel.classList.contains('placeholder')) pdLabel.textContent = L.selectProtein;
    else if (pdLabel && sel.protein) pdLabel.textContent = tProteinLabel(sel.protein);

    // Cut section title
    const step2t = document.getElementById('step2-title');
    if (step2t && sel.protein)
      step2t.textContent = L.chooseCut(tProteinLabel(sel.protein));

    // Cut placeholder / selected label
    const cdLabel = document.getElementById('cd-label');
    if (cdLabel && cdLabel.classList.contains('placeholder')) cdLabel.textContent = L.selectCut;
    else if (cdLabel && sel.protein && sel.cut) cdLabel.textContent = tCutLabel(sel.protein, sel.cut);

    // Cut sub (method · temp)
    if (sel.protein && sel.cut) {
      const cut    = MEAT_CONFIG[sel.protein].cuts[sel.cut];
      const cdSub  = document.getElementById('cd-label-sub');
      if (cdSub && cdSub.textContent) cdSub.textContent = `${tMethod(cut.method)} · ${cut.ovenC}°C`;
    }

    // Weight & Doneness section
    const wdLbl = document.querySelector('#sec-weight .section-label');
    if (wdLbl) wdLbl.textContent = L.weightDoneness;
    const wdSub = document.querySelector('#sec-weight .section-sub');
    if (wdSub && sel.protein && sel.cut)
      wdSub.innerHTML = L.weighYour(tCutLabel(sel.protein, sel.cut));
    const dnLbl = document.querySelector('.doneness-label');
    if (dnLbl) dnLbl.textContent = L.donenessLabel;

    // Scale protein name
    const scaleName = document.getElementById('scale-protein-name');
    if (scaleName && sel.protein && sel.cut)
      scaleName.textContent = tCutLabel(sel.protein, sel.cut);

    // Calculate button
    const calcBtn = document.getElementById('btn-calculate');
    if (calcBtn) calcBtn.textContent = L.calculate;

    // Results section labels
    const yourCookLbl = document.querySelector('#sec-results .section-label');
    if (yourCookLbl) yourCookLbl.textContent = L.yourCook;
    const rcLabels = document.querySelectorAll('.rc-label');
    if (rcLabels[0]) rcLabels[0].textContent = L.cookTime;
    if (rcLabels[1]) rcLabels[1].textContent = L.ovenTemp;
    if (rcLabels[2]) rcLabels[2].textContent = L.restTime;
    const stepsLbl = document.querySelector('.results-steps-label');
    if (stepsLbl) stepsLbl.textContent = L.stepsLabel;

    // Buttons
    const restartBtns = document.querySelectorAll('.btn-restart-inline');
    if (restartBtns[0]) restartBtns[0].textContent = L.startOver;
    if (restartBtns[1]) restartBtns[1].textContent = L.copyResults;

    // Photo badges
    const cacheBadge = document.getElementById('dish-cache-badge');
    if (cacheBadge) cacheBadge.textContent = L.cached;
    const savePhotoBtn = document.getElementById('dish-save-btn');
    if (savePhotoBtn) savePhotoBtn.textContent = L.savePhoto;

    // Rebuild doneness buttons if visible
    if (sel.protein && sel.cut && document.getElementById('doneness-row').children.length > 0) {
      buildDonenessRow();
      if (sel.doneness) selectDoneness(sel.doneness);
    }

    // Rebuild results if showing
    const resEl = document.getElementById('sec-results');
    if (resEl && resEl.classList.contains('pg-reveal') && sel.protein && sel.cut && sel.doneness && sel.weight) {
      buildResults();
    }
  }

  function toggleLang() {
    currentLang = currentLang === 'en' ? 'he' : 'en';
    applyLang();
  }

</script>
